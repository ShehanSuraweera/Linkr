<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="ui-monospace,monospace" font-size="12">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
    <marker id="b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#e11d48"/>
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="330" y="14" width="160" height="40" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="410" y="33" text-anchor="middle" fill="#334155" font-weight="600">Browser</text>
  <text x="410" y="48" text-anchor="middle" fill="#64748b" font-size="10">user agent</text>

  <!-- Browser to Frontend arrow -->
  <line x1="370" y1="54" x2="230" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="260" y="82" fill="#64748b" font-size="10">page / SSR</text>

  <!-- Browser to Backend arrow -->
  <line x1="450" y1="54" x2="590" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="500" y="82" fill="#94a3b8" font-size="10">redirect /:code</text>

  <!-- Next.js Frontend -->
  <rect x="100" y="100" width="200" height="56" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="122" text-anchor="middle" fill="#3730a3" font-weight="600">Next.js Frontend</text>
  <text x="200" y="139" text-anchor="middle" fill="#6366f1" font-size="10">:3000  ·  App Router</text>
  <text x="200" y="151" text-anchor="middle" fill="#6366f1" font-size="10">server + client components</text>

  <!-- Go Backend -->
  <rect x="480" y="100" width="220" height="56" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="590" y="122" text-anchor="middle" fill="#9f1239" font-weight="600">Go Backend (Gin)</text>
  <text x="590" y="139" text-anchor="middle" fill="#e11d48" font-size="10">:8080  ·  stateless · REST + redirect</text>
  <text x="590" y="151" text-anchor="middle" fill="#e11d48" font-size="10">Prometheus  ·  /healthz  ·  /readyz</text>

  <!-- Frontend to Backend (internal Docker) -->
  <line x1="300" y1="128" x2="480" y2="128" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="380" y="121" text-anchor="middle" fill="#64748b" font-size="10">internal Docker network</text>
  <text x="380" y="133" text-anchor="middle" fill="#64748b" font-size="10">API_URL=http://backend:8080</text>

  <!-- Backend to Redis -->
  <line x1="560" y1="156" x2="460" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="480" y="200" fill="#64748b" font-size="10">L2 cache</text>
  <text x="480" y="211" fill="#64748b" font-size="10">rate limit</text>

  <!-- Backend to Postgres -->
  <line x1="630" y1="156" x2="680" y2="230" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="655" y="200" fill="#64748b" font-size="10">pgx pool</text>
  <text x="655" y="211" fill="#64748b" font-size="10">25 conns</text>

  <!-- Redis -->
  <rect x="360" y="230" width="170" height="52" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="445" y="252" text-anchor="middle" fill="#9a3412" font-weight="600">Redis 7</text>
  <text x="445" y="268" text-anchor="middle" fill="#f97316" font-size="10">L2 link cache  ·  TTL 300 s</text>
  <text x="445" y="280" text-anchor="middle" fill="#f97316" font-size="10">GCRA rate limiting</text>

  <!-- Postgres -->
  <rect x="580" y="230" width="180" height="52" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="670" y="252" text-anchor="middle" fill="#14532d" font-weight="600">PostgreSQL 16</text>
  <text x="670" y="268" text-anchor="middle" fill="#16a34a" font-size="10">users · links · clicks</text>
  <text x="670" y="280" text-anchor="middle" fill="#16a34a" font-size="10">click_daily · breakdowns</text>

  <!-- Redis to Postgres (click flush) -->
  <line x1="530" y1="268" x2="580" y2="268" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>

  <!-- L1 LRU box inside backend -->
  <rect x="490" y="176" width="100" height="26" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="193" text-anchor="middle" fill="#92400e" font-size="10">L1 LRU (per replica)</text>

  <!-- Click pipeline note -->
  <rect x="100" y="230" width="230" height="52" rx="6" fill="#fdf2f8" stroke="#a855f7" stroke-width="1.5"/>
  <text x="215" y="252" text-anchor="middle" fill="#6b21a8" font-weight="600">Async Click Pipeline</text>
  <text x="215" y="268" text-anchor="middle" fill="#a855f7" font-size="10">buffered chan (10k)  →  N workers</text>
  <text x="215" y="280" text-anchor="middle" fill="#a855f7" font-size="10">batch CopyFrom → Postgres</text>

  <line x1="590" y1="156" x2="290" y2="238" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="390" y="207" fill="#a855f7" font-size="10">enqueue (non-blocking)</text>

  <line x1="330" y1="268" x2="360" y2="268" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>

  <!-- Legend -->
  <rect x="20" y="330" width="780" height="58" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="348" fill="#475569" font-size="11" font-weight="600">Legend</text>
  <rect x="40" y="356" width="12" height="12" rx="2" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="57" y="367" fill="#475569" font-size="10">Go service</text>
  <rect x="140" y="356" width="12" height="12" rx="2" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="157" y="367" fill="#475569" font-size="10">Next.js</text>
  <rect x="220" y="356" width="12" height="12" rx="2" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="237" y="367" fill="#475569" font-size="10">Redis</text>
  <rect x="290" y="356" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="307" y="367" fill="#475569" font-size="10">PostgreSQL</text>
  <rect x="390" y="356" width="12" height="12" rx="2" fill="#fdf2f8" stroke="#a855f7" stroke-width="1.5"/>
  <text x="407" y="367" fill="#475569" font-size="10">Click pipeline</text>
  <line x1="500" y1="362" x2="530" y2="362" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="535" y="367" fill="#475569" font-size="10">internal / async</text>
  <line x1="640" y1="362" x2="670" y2="362" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="675" y="367" fill="#475569" font-size="10">direct HTTP</text>
  <text x="410" y="382" text-anchor="middle" fill="#94a3b8" font-size="10">docker compose: postgres + redis + backend + frontend — single command to run all four</text>
</svg>
