<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="ui-monospace,monospace" font-size="12">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
    <marker id="p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a855f7"/>
    </marker>
    <marker id="r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#e11d48"/>
    </marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">Async Click Recording Pipeline</text>

  <!-- Redirect Handler -->
  <rect x="30" y="40" width="180" height="52" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="120" y="62" text-anchor="middle" fill="#9f1239" font-weight="700">Redirect Handler</text>
  <text x="120" y="77" text-anchor="middle" fill="#e11d48" font-size="10">returns 302 before</text>
  <text x="120" y="89" text-anchor="middle" fill="#e11d48" font-size="10">any click I/O</text>

  <!-- Arrow to Enqueue -->
  <line x1="210" y1="66" x2="256" y2="66" stroke="#a855f7" stroke-width="1.5" marker-end="url(#p)"/>
  <text x="232" y="60" text-anchor="middle" fill="#a855f7" font-size="9">non-blocking</text>
  <text x="232" y="72" text-anchor="middle" fill="#a855f7" font-size="9">select</text>

  <!-- Buffered Channel -->
  <rect x="256" y="40" width="260" height="52" rx="6" fill="#fdf2f8" stroke="#a855f7" stroke-width="2"/>
  <text x="386" y="58" text-anchor="middle" fill="#6b21a8" font-weight="700">Buffered Channel</text>
  <text x="386" y="73" text-anchor="middle" fill="#a855f7" font-size="10">cap 10,000 events · drops on full</text>
  <text x="386" y="86" text-anchor="middle" fill="#a855f7" font-size="10">never blocks the redirect path</text>

  <!-- Drop arrow -->
  <line x1="386" y1="92" x2="386" y2="120" stroke="#e11d48" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#r)"/>
  <rect x="316" y="120" width="140" height="28" rx="4" fill="#fff1f2" stroke="#e11d48" stroke-width="1"/>
  <text x="386" y="135" text-anchor="middle" fill="#9f1239" font-size="10">DROP (queue full)</text>
  <text x="386" y="145" text-anchor="middle" fill="#e11d48" font-size="9">redirect latency wins over analytics</text>

  <!-- Arrow to workers -->
  <line x1="516" y1="66" x2="560" y2="66" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Workers box -->
  <rect x="560" y="40" width="230" height="52" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="675" y="62" text-anchor="middle" fill="#1e40af" font-weight="700">N Worker Goroutines</text>
  <text x="675" y="77" text-anchor="middle" fill="#3b82f6" font-size="10">for range channel</text>
  <text x="675" y="89" text-anchor="middle" fill="#3b82f6" font-size="10">accumulate batch in-memory</text>

  <!-- Flush conditions -->
  <rect x="560" y="110" width="230" height="80" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="675" y="128" text-anchor="middle" fill="#334155" font-weight="600" font-size="11">Flush triggers (whichever first)</text>
  <rect x="575" y="134" width="90" height="22" rx="4" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1"/>
  <text x="620" y="149" text-anchor="middle" fill="#0c4a6e" font-size="10">batch ≥ 500 events</text>
  <rect x="685" y="134" width="90" height="22" rx="4" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1"/>
  <text x="730" y="149" text-anchor="middle" fill="#0c4a6e" font-size="10">ticker every 200 ms</text>
  <text x="675" y="180" text-anchor="middle" fill="#64748b" font-size="10">10 s ctx timeout per flush</text>

  <!-- Workers → Postgres CopyFrom -->
  <line x1="675" y1="190" x2="675" y2="222" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="560" y="222" width="230" height="52" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="675" y="244" text-anchor="middle" fill="#14532d" font-weight="700">PostgreSQL — CopyFrom</text>
  <text x="675" y="258" text-anchor="middle" fill="#16a34a" font-size="10">Postgres COPY wire protocol</text>
  <text x="675" y="270" text-anchor="middle" fill="#16a34a" font-size="10">much faster than row inserts</text>

  <!-- Shutdown flow -->
  <rect x="30" y="200" width="490" height="170" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="275" y="220" text-anchor="middle" fill="#475569" font-size="11" font-weight="700">Graceful Shutdown (SIGTERM)</text>

  <rect x="50" y="228" width="130" height="34" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="115" y="244" text-anchor="middle" fill="#713f12" font-weight="600" font-size="10">SIGTERM received</text>
  <text x="115" y="256" text-anchor="middle" fill="#ca8a04" font-size="9">main.go context cancel</text>

  <line x1="180" y1="245" x2="210" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="210" y="228" width="130" height="34" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="275" y="244" text-anchor="middle" fill="#713f12" font-weight="600" font-size="10">Pipeline.Stop()</text>
  <text x="275" y="256" text-anchor="middle" fill="#ca8a04" font-size="9">close(channel)</text>

  <line x1="340" y1="245" x2="370" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="370" y="228" width="130" height="34" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="435" y="244" text-anchor="middle" fill="#713f12" font-weight="600" font-size="10">workers drain</text>
  <text x="435" y="256" text-anchor="middle" fill="#ca8a04" font-size="9">flush partial batches</text>

  <text x="275" y="286" text-anchor="middle" fill="#475569" font-size="10">wg.Wait() — main blocks until all workers done — no click loss</text>

  <!-- Hard crash note -->
  <rect x="50" y="298" width="430" height="58" rx="4" fill="#fff1f2" stroke="#e11d48" stroke-width="1"/>
  <text x="265" y="315" text-anchor="middle" fill="#9f1239" font-size="10" font-weight="600">Hard Crash (SIGKILL / OOM) — accepted trade-off</text>
  <text x="265" y="329" text-anchor="middle" fill="#e11d48" font-size="9">events in channel + mid-flush batch are lost · bounded by bufferSize × flushInterval</text>
  <text x="265" y="342" text-anchor="middle" fill="#e11d48" font-size="9">clicks are analytics, not financial records · zero-loss needs Redis Streams / Kafka</text>
</svg>
