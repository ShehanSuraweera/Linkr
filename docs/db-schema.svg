<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="ui-monospace,monospace" font-size="11">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">Database Schema</text>

  <!-- users table -->
  <rect x="30" y="38" width="210" height="110" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="30" y="38" width="210" height="26" rx="6" fill="#16a34a"/>
  <text x="135" y="56" text-anchor="middle" fill="white" font-weight="700">users</text>
  <text x="48" y="80" fill="#14532d">id</text><text x="185" y="80" fill="#64748b" text-anchor="end">BIGINT PK</text>
  <text x="48" y="95" fill="#14532d">email</text><text x="185" y="95" fill="#64748b" text-anchor="end">TEXT UNIQUE</text>
  <text x="48" y="110" fill="#14532d">password_hash</text><text x="185" y="110" fill="#64748b" text-anchor="end">TEXT</text>
  <text x="48" y="125" fill="#14532d">created_at</text><text x="185" y="125" fill="#64748b" text-anchor="end">TIMESTAMPTZ</text>
  <rect x="32" y="130" width="206" height="16" rx="0"/>
  <text x="48" y="142" fill="#64748b" font-size="9">🔑 id  |  idx: email (unique)</text>

  <!-- links table -->
  <rect x="300" y="38" width="230" height="168" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <rect x="300" y="38" width="230" height="26" rx="6" fill="#e11d48"/>
  <text x="415" y="56" text-anchor="middle" fill="white" font-weight="700">links</text>
  <text x="318" y="80" fill="#9f1239">id</text><text x="520" y="80" fill="#64748b" text-anchor="end">BIGINT PK</text>
  <text x="318" y="95" fill="#9f1239">short_code</text><text x="520" y="95" fill="#64748b" text-anchor="end">TEXT UNIQUE</text>
  <text x="318" y="110" fill="#9f1239">original_url</text><text x="520" y="110" fill="#64748b" text-anchor="end">TEXT</text>
  <text x="318" y="125" fill="#9f1239">user_id</text><text x="520" y="125" fill="#e11d48" text-anchor="end">→ users.id FK</text>
  <text x="318" y="140" fill="#9f1239">created_at</text><text x="520" y="140" fill="#64748b" text-anchor="end">TIMESTAMPTZ</text>
  <text x="318" y="155" fill="#9f1239">expires_at</text><text x="520" y="155" fill="#64748b" text-anchor="end">TIMESTAMPTZ NULL</text>
  <text x="318" y="170" fill="#9f1239">is_active</text><text x="520" y="170" fill="#64748b" text-anchor="end">BOOLEAN</text>
  <text x="318" y="185" fill="#9f1239">deleted_at</text><text x="520" y="185" fill="#64748b" text-anchor="end">TIMESTAMPTZ NULL</text>
  <text x="318" y="200" fill="#94a3b8" font-size="9">idx: short_code (unique hot-path)</text>
  <text x="318" y="212" fill="#94a3b8" font-size="9">idx: (user_id, created_at DESC) WHERE deleted_at IS NULL</text>

  <!-- users → links arrow -->
  <line x1="240" y1="80" x2="300" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="258" y="97" fill="#64748b" font-size="9">1 : N</text>

  <!-- clicks table -->
  <rect x="580" y="38" width="210" height="120" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="580" y="38" width="210" height="26" rx="6" fill="#3b82f6"/>
  <text x="685" y="56" text-anchor="middle" fill="white" font-weight="700">clicks (raw)</text>
  <text x="598" y="80" fill="#1e40af">id</text><text x="782" y="80" fill="#64748b" text-anchor="end">BIGINT PK</text>
  <text x="598" y="95" fill="#1e40af">link_id</text><text x="782" y="95" fill="#3b82f6" text-anchor="end">→ links.id FK</text>
  <text x="598" y="110" fill="#1e40af">clicked_at</text><text x="782" y="110" fill="#64748b" text-anchor="end">TIMESTAMPTZ</text>
  <text x="598" y="125" fill="#1e40af">ip_hash</text><text x="782" y="125" fill="#64748b" text-anchor="end">TEXT NULL</text>
  <text x="598" y="140" fill="#94a3b8" font-size="9">idx: (link_id, clicked_at)</text>
  <text x="598" y="152" fill="#94a3b8" font-size="9">inserted via CopyFrom in batches</text>

  <!-- links → clicks arrow -->
  <line x1="530" y1="80" x2="580" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="550" y="73" fill="#64748b" font-size="9">1 : N</text>

  <!-- Pre-aggregated tables row -->
  <text x="410" y="240" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">Pre-aggregated analytics tables (populated by click pipeline at collection time)</text>

  <!-- click_daily -->
  <rect x="30" y="254" width="180" height="100" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <rect x="30" y="254" width="180" height="24" rx="6" fill="#f97316"/>
  <text x="120" y="270" text-anchor="middle" fill="white" font-weight="700">click_daily</text>
  <text x="48" y="294" fill="#9a3412">link_id</text><text x="202" y="294" fill="#f97316" text-anchor="end">→ links.id</text>
  <text x="48" y="309" fill="#9a3412">day</text><text x="202" y="309" fill="#64748b" text-anchor="end">DATE</text>
  <text x="48" y="324" fill="#9a3412">count</text><text x="202" y="324" fill="#64748b" text-anchor="end">BIGINT</text>
  <text x="48" y="342" fill="#94a3b8" font-size="9">PK (link_id, day)</text>

  <!-- clicks_by_device -->
  <rect x="225" y="254" width="180" height="110" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <rect x="225" y="254" width="180" height="24" rx="6" fill="#f97316"/>
  <text x="315" y="270" text-anchor="middle" fill="white" font-weight="700">clicks_by_device</text>
  <text x="243" y="294" fill="#9a3412">link_id</text><text x="397" y="294" fill="#f97316" text-anchor="end">→ links.id</text>
  <text x="243" y="309" fill="#9a3412">day</text><text x="397" y="309" fill="#64748b" text-anchor="end">DATE</text>
  <text x="243" y="324" fill="#9a3412">device</text><text x="397" y="324" fill="#64748b" text-anchor="end">TEXT</text>
  <text x="243" y="339" fill="#9a3412">count</text><text x="397" y="339" fill="#64748b" text-anchor="end">BIGINT</text>
  <text x="243" y="357" fill="#94a3b8" font-size="9">PK (link_id, day, device)</text>
  <text x="243" y="368" fill="#94a3b8" font-size="9">desktop|mobile|tablet</text>

  <!-- clicks_by_browser -->
  <rect x="420" y="254" width="180" height="110" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <rect x="420" y="254" width="180" height="24" rx="6" fill="#f97316"/>
  <text x="510" y="270" text-anchor="middle" fill="white" font-weight="700">clicks_by_browser</text>
  <text x="438" y="294" fill="#9a3412">link_id</text><text x="592" y="294" fill="#f97316" text-anchor="end">→ links.id</text>
  <text x="438" y="309" fill="#9a3412">day</text><text x="592" y="309" fill="#64748b" text-anchor="end">DATE</text>
  <text x="438" y="324" fill="#9a3412">browser</text><text x="592" y="324" fill="#64748b" text-anchor="end">TEXT</text>
  <text x="438" y="339" fill="#9a3412">count</text><text x="592" y="339" fill="#64748b" text-anchor="end">BIGINT</text>
  <text x="438" y="357" fill="#94a3b8" font-size="9">PK (link_id, day, browser)</text>
  <text x="438" y="368" fill="#94a3b8" font-size="9">chrome|firefox|safari|edge…</text>

  <!-- clicks_by_referer -->
  <rect x="615" y="254" width="180" height="110" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <rect x="615" y="254" width="180" height="24" rx="6" fill="#f97316"/>
  <text x="705" y="270" text-anchor="middle" fill="white" font-weight="700">clicks_by_referer</text>
  <text x="633" y="294" fill="#9a3412">link_id</text><text x="787" y="294" fill="#f97316" text-anchor="end">→ links.id</text>
  <text x="633" y="309" fill="#9a3412">day</text><text x="787" y="309" fill="#64748b" text-anchor="end">DATE</text>
  <text x="633" y="324" fill="#9a3412">domain</text><text x="787" y="324" fill="#64748b" text-anchor="end">TEXT</text>
  <text x="633" y="339" fill="#9a3412">count</text><text x="787" y="339" fill="#64748b" text-anchor="end">BIGINT</text>
  <text x="633" y="357" fill="#94a3b8" font-size="9">PK (link_id, day, domain)</text>
  <text x="633" y="368" fill="#94a3b8" font-size="9">hostname or 'direct'</text>

  <!-- links → aggregated tables arrows -->
  <line x1="415" y1="206" x2="120" y2="254" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <line x1="415" y1="206" x2="315" y2="254" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <line x1="415" y1="206" x2="510" y2="254" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <line x1="415" y1="206" x2="705" y2="254" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#a)"/>

  <!-- Note about raw UA data -->
  <rect x="30" y="390" width="760" height="70" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="408" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">Privacy design: raw user_agent and referer dropped in migration 004</text>
  <text x="410" y="424" text-anchor="middle" fill="#64748b" font-size="10">Device, browser, and referer domain are parsed at collection time in the pipeline and written to the breakdown tables.</text>
  <text x="410" y="439" text-anchor="middle" fill="#64748b" font-size="10">Raw personal signals are never persisted. ip_hash is stored only as a hash for approximate unique visitor counting.</text>
  <text x="410" y="454" text-anchor="middle" fill="#94a3b8" font-size="9">Migrations managed by golang-migrate · runs automatically on startup · 4 migrations total</text>
</svg>
