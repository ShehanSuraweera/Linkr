<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="ui-monospace,monospace" font-size="12">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#94a3b8"/>
    </marker>
    <marker id="hit" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#16a34a"/>
    </marker>
    <marker id="miss" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#e11d48"/>
    </marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">Redirect Hot Path — Cache Cascade</text>

  <!-- Request -->
  <rect x="310" y="36" width="200" height="38" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="410" y="54" text-anchor="middle" fill="#334155" font-weight="700">GET /:code</text>
  <text x="410" y="68" text-anchor="middle" fill="#64748b" font-size="10">rate limit check first (per-IP token bucket / GCRA)</text>

  <!-- Arrow down to L1 -->
  <line x1="410" y1="74" x2="410" y2="106" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- L1 LRU -->
  <rect x="280" y="106" width="260" height="44" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="410" y="126" text-anchor="middle" fill="#92400e" font-weight="700">L1 LRU Cache (in-process)</text>
  <text x="410" y="142" text-anchor="middle" fill="#d97706" font-size="10">expirable · 10k entries · 30 s TTL · sub-microsecond</text>

  <!-- L1 HIT → response -->
  <line x1="540" y1="128" x2="660" y2="128" stroke="#16a34a" stroke-width="2" marker-end="url(#hit)"/>
  <text x="598" y="121" fill="#16a34a" font-size="10" font-weight="600">HIT</text>
  <rect x="660" y="110" width="140" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="730" y="128" text-anchor="middle" fill="#14532d" font-weight="600">302 Redirect</text>
  <text x="730" y="141" text-anchor="middle" fill="#16a34a" font-size="9">~1 µs · zero I/O</text>

  <!-- L1 MISS → circuit breaker -->
  <line x1="410" y1="150" x2="410" y2="182" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#miss)"/>
  <text x="424" y="170" fill="#e11d48" font-size="10">MISS</text>

  <!-- Circuit Breaker -->
  <rect x="270" y="182" width="280" height="44" rx="6" fill="#fdf2f8" stroke="#a855f7" stroke-width="2"/>
  <text x="410" y="202" text-anchor="middle" fill="#6b21a8" font-weight="700">Circuit Breaker (gobreaker)</text>
  <text x="410" y="218" text-anchor="middle" fill="#a855f7" font-size="10">open after 5 consecutive Redis errors · resets after 30 s</text>

  <!-- Breaker CLOSED → Redis -->
  <line x1="410" y1="226" x2="410" y2="258" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="424" y="246" fill="#64748b" font-size="10">CLOSED</text>

  <!-- Breaker OPEN → skip to singleflight -->
  <line x1="270" y1="204" x2="160" y2="290" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#miss)"/>
  <text x="168" y="252" fill="#e11d48" font-size="10">OPEN →</text>
  <text x="160" y="264" fill="#e11d48" font-size="10">skip Redis</text>

  <!-- Redis -->
  <rect x="270" y="258" width="280" height="44" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="410" y="278" text-anchor="middle" fill="#9a3412" font-weight="700">Redis L2 Cache</text>
  <text x="410" y="294" text-anchor="middle" fill="#f97316" font-size="10">GET link:{code} · TTL 300 s · shared across replicas</text>

  <!-- Redis HIT → backfill L1 → response -->
  <line x1="550" y1="280" x2="660" y2="280" stroke="#16a34a" stroke-width="2" marker-end="url(#hit)"/>
  <text x="598" y="273" fill="#16a34a" font-size="10" font-weight="600">HIT</text>
  <rect x="660" y="262" width="140" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="730" y="278" text-anchor="middle" fill="#14532d" font-weight="600">302 Redirect</text>
  <text x="730" y="291" text-anchor="middle" fill="#16a34a" font-size="9">+ backfill L1</text>

  <!-- Redis MISS → singleflight -->
  <line x1="410" y1="302" x2="410" y2="334" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#miss)"/>
  <text x="424" y="322" fill="#e11d48" font-size="10">MISS</text>

  <!-- Singleflight -->
  <rect x="250" y="334" width="320" height="44" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="354" text-anchor="middle" fill="#1e40af" font-weight="700">singleflight.Do(code, ...)</text>
  <text x="410" y="370" text-anchor="middle" fill="#3b82f6" font-size="10">collapses concurrent cold misses → 1 Postgres query per code</text>

  <!-- Singleflight → Postgres -->
  <line x1="410" y1="378" x2="410" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Postgres -->
  <rect x="270" y="410" width="280" height="44" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="410" y="430" text-anchor="middle" fill="#14532d" font-weight="700">PostgreSQL</text>
  <text x="410" y="446" text-anchor="middle" fill="#16a34a" font-size="10">SELECT by short_code (unique index) · pgxpool · backfill Redis + L1</text>

  <!-- Postgres → response -->
  <line x1="550" y1="432" x2="660" y2="432" stroke="#16a34a" stroke-width="2" marker-end="url(#hit)"/>
  <rect x="660" y="414" width="140" height="36" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="730" y="430" text-anchor="middle" fill="#14532d" font-weight="600">302 Redirect</text>
  <text x="730" y="443" text-anchor="middle" fill="#16a34a" font-size="9">backfill Redis + L1</text>

  <!-- Async click enqueue (right side annotation) -->
  <rect x="660" y="334" width="140" height="50" rx="4" fill="#fdf2f8" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="730" y="353" text-anchor="middle" fill="#6b21a8" font-size="10" font-weight="600">async click</text>
  <text x="730" y="366" text-anchor="middle" fill="#a855f7" font-size="9">Enqueue() non-blocking</text>
  <text x="730" y="378" text-anchor="middle" fill="#a855f7" font-size="9">returns before any I/O</text>
  <line x1="730" y1="384" x2="730" y2="414" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>
  <!-- annotation arrow -->
  <line x1="660" y1="354" x2="570" y2="354" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="570" y1="354" x2="570" y2="390" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="590" y="390" fill="#a855f7" font-size="9">every path</text>

  <!-- Left annotation: singleflight joins -->
  <rect x="20" y="334" width="215" height="44" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="127" y="352" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">N concurrent misses for same code</text>
  <text x="127" y="365" text-anchor="middle" fill="#64748b" font-size="9">→ all join the same in-flight call</text>
  <text x="127" y="376" text-anchor="middle" fill="#64748b" font-size="9">→ 1 DB query, N waiters unblocked</text>
  <line x1="235" y1="356" x2="250" y2="356" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>
</svg>
